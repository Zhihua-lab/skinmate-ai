[build]
  base = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/analyze-video"
  to = "/.netlify/functions/analyze-video"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
